name: Smoke test

# End-to-end print smoke test on every OS: package the real app, create a
# virtual printer whose output lands in a file, drive the WebSocket protocol
# with scripts/smoke-test.mjs, and assert a print actually came out.
#
# - Windows: "Microsoft Print to PDF" redirected to a local file port —
#   exercises the vendored SumatraPDF, including the asar-unpacked exe path.
# - Linux:   cups-pdf virtual printer — exercises the CUPS lp backend.
# - macOS:   ippeveprinter IPP Everywhere queue saving jobs to a directory
#   (raw file: queues are no longer supported on macOS).

on:
  push:
  workflow_dispatch:

jobs:
  smoke-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run package
      - name: List package output
        run: Get-ChildItem out
      - name: Redirect "Microsoft Print to PDF" to a file port
        run: |
          New-Item -ItemType Directory -Force -Path C:\smoke | Out-Null
          Add-PrinterPort -Name "C:\smoke\out.pdf"
          Set-Printer -Name "Microsoft Print to PDF" -PortName "C:\smoke\out.pdf"
      # The app must be launched, exercised, and stopped in ONE step: the
      # Windows runner wraps each step in a job object and kills processes
      # started by the step when it ends, so an app launched in its own step
      # is dead before the next step runs.
      - name: Launch the app and run the smoke test
        run: |
          $proc = Start-Process -FilePath "out\Olorin Companion-win32-x64\Olorin Companion.exe" -PassThru -RedirectStandardOutput C:\smoke\app.log -RedirectStandardError C:\smoke\app-err.log
          try {
            node scripts/smoke-test.mjs --printer "Microsoft Print to PDF" --output "C:\smoke\out.pdf"
            $code = $LASTEXITCODE
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }
          Write-Host "--- app.log ---"
          Get-Content C:\smoke\app.log -ErrorAction SilentlyContinue
          exit $code
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-windows-logs
          path: C:\smoke\*.log

  # Same end-to-end print, but through the actual Squirrel installer instead
  # of the bare packaged directory — validates the installer, the
  # electron-squirrel-startup handling, and the installed app's layout.
  smoke-windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run make -- --targets @electron-forge/maker-squirrel
      - name: Redirect "Microsoft Print to PDF" to a file port
        run: |
          New-Item -ItemType Directory -Force -Path C:\smoke | Out-Null
          Add-PrinterPort -Name "C:\smoke\out.pdf"
          Set-Printer -Name "Microsoft Print to PDF" -PortName "C:\smoke\out.pdf"
      - name: Install with the Squirrel setup and run the smoke test
        run: |
          $setup = Get-ChildItem "out\make\squirrel.windows\x64\*Setup.exe" | Select-Object -First 1
          Write-Host "Installing $($setup.FullName)"
          # No -Wait: in PowerShell 7 it waits for the whole process tree,
          # and the setup auto-launches the (never-exiting) tray app. The
          # smoke script polls for the server instead.
          Start-Process -FilePath $setup.FullName
          try {
            node scripts/smoke-test.mjs --printer "Microsoft Print to PDF" --output "C:\smoke\out.pdf"
            $code = $LASTEXITCODE
          } finally {
            Stop-Process -Name "Olorin Companion" -Force -ErrorAction SilentlyContinue
          }
          Get-ChildItem "$env:LOCALAPPDATA\olorin_companion" -ErrorAction SilentlyContinue
          exit $code

  smoke-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install CUPS and the cups-pdf virtual printer
        run: |
          sudo apt-get update
          sudo apt-get install -y cups cups-client printer-driver-cups-pdf xvfb
          sudo systemctl restart cups
          # Wait for the auto-created PDF queue
          for i in $(seq 1 30); do lpstat -p PDF > /dev/null 2>&1 && break; sleep 1; done
          lpstat -p
      - run: npm ci
      - run: npm run package
      - name: List package output
        run: ls out
      - name: Launch the packaged app
        run: |
          export ELECTRON_DISABLE_SANDBOX=1
          nohup xvfb-run --auto-servernum "out/Olorin Companion-linux-x64/Olorin Companion" > /tmp/app.log 2>&1 &
      - name: Run smoke test
        run: node scripts/smoke-test.mjs --printer "PDF" --output "$HOME/PDF/*.pdf"
      - name: Stop the app
        if: always()
        run: pkill -f "Olorin Companion" || true
      - name: Show app log on failure
        if: failure()
        run: cat /tmp/app.log || true

  smoke-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Create an IPP Everywhere test printer saving jobs to a directory
        run: |
          mkdir -p /tmp/smoke-spool
          IPPEVE=$(command -v ippeveprinter || echo /usr/sbin/ippeveprinter)
          nohup "$IPPEVE" -d /tmp/smoke-spool -k -p 8631 SmokePrinter > /tmp/ippeve.log 2>&1 &
          sleep 3
          sudo lpadmin -p SmokePrinter -E -v "ipp://127.0.0.1:8631/ipp/print" -m everywhere
          lpstat -p
      - run: npm ci
      - run: npm run package
      - name: List package output
        run: ls out
      - name: Launch the packaged app
        run: nohup "out/Olorin Companion-darwin-arm64/Olorin Companion.app/Contents/MacOS/Olorin Companion" > /tmp/app.log 2>&1 &
      - name: Run smoke test
        run: node scripts/smoke-test.mjs --printer "SmokePrinter" --output "/tmp/smoke-spool/*"
      - name: Stop the app
        if: always()
        run: pkill -f "Olorin Companion" || true
      - name: Show app log on failure
        if: failure()
        run: cat /tmp/app.log || true
