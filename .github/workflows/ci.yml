name: CI

on:
  push:
  pull_request:
  schedule:
    # Nightly off-peak run to catch breakage from renewed runner images and
    # unpinned dependencies even when nothing is pushed.
    - cron: "17 4 * * *"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  package:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install rpm tooling
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm
      - run: npm ci
      - run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: olorin-companion-${{ matrix.os }}
          path: out/make/**
